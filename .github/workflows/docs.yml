name: Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "README.md"
      - "mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MkDocs dependencies
        run: pip install "mkdocs-material>=9.5,<10" "mkdocs-include-markdown-plugin>=7.0,<8"

      - name: Build docs
        run: mkdocs build

      - name: Include package repos from releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/repo

          # Stable channel — latest non-prerelease
          STABLE_TAG=$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 \
            --json tagName -q '.[0].tagName' 2>/dev/null) || true
          if [[ -n "$STABLE_TAG" ]]; then
            if gh release download "$STABLE_TAG" --pattern 'repo-stable.tar.gz' --dir /tmp/repo 2>/dev/null; then
              echo "==> Extracting stable package repo ($STABLE_TAG)"
              mkdir -p site/packages/stable
              tar -xzf /tmp/repo/repo-stable.tar.gz -C site/packages/stable/
            fi
          fi

          # Unstable channel — latest prerelease
          UNSTABLE_TAG=$(gh release list --exclude-drafts --limit 50 \
            --json tagName,isPrerelease -q '[.[] | select(.isPrerelease)][0].tagName' 2>/dev/null) || true
          if [[ -n "$UNSTABLE_TAG" ]]; then
            if gh release download "$UNSTABLE_TAG" --pattern 'repo-unstable.tar.gz' --dir /tmp/repo 2>/dev/null; then
              echo "==> Extracting unstable package repo ($UNSTABLE_TAG)"
              mkdir -p site/packages/unstable
              tar -xzf /tmp/repo/repo-unstable.tar.gz -C site/packages/unstable/
            fi
          fi

          if [[ ! -d site/packages/stable && ! -d site/packages/unstable ]]; then
            echo "==> No package repos found, deploying docs only"
          fi

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          ghp-import -n -p -f site
