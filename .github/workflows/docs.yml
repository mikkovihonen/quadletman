name: Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "README.md"
      - "mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs dependencies
        run: pip install "mkdocs-material>=9.5,<10" "mkdocs-include-markdown-plugin>=7.0,<8"

      - name: Deploy docs
        run: mkdocs gh-deploy --force
