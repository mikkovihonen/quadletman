name: Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "README.md"
      - "mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MkDocs dependencies
        run: pip install "mkdocs-material>=9.5,<10" "mkdocs-include-markdown-plugin>=7.0,<8"

      - name: Build docs
        run: mkdocs build

      - name: Include package repos from releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/repo

          # Detect stable/unstable by tag pattern (contains '-' = unstable) rather
          # than the GitHub prerelease flag, which may be toggled manually.

          # Stable channel — latest tag without a hyphenated suffix (e.g. v1.0.0)
          STABLE_TAG=$(gh release list --exclude-drafts --limit 50 \
            --json tagName -q '[.[] | select(.tagName | test("-") | not)][0].tagName' 2>/dev/null) || true
          if [[ -n "$STABLE_TAG" ]]; then
            if gh release download "$STABLE_TAG" --pattern 'repo-stable.tar.gz' --dir /tmp/repo 2>/dev/null; then
              echo "==> Extracting stable package repo ($STABLE_TAG)"
              mkdir -p site/packages/stable
              tar -xzf /tmp/repo/repo-stable.tar.gz -C site/packages/stable/
            fi
          fi

          # Unstable channel — latest tag with a hyphenated suffix (e.g. v1.0.0-alpha)
          UNSTABLE_TAG=$(gh release list --exclude-drafts --limit 50 \
            --json tagName -q '[.[] | select(.tagName | test("-"))][0].tagName' 2>/dev/null) || true
          if [[ -n "$UNSTABLE_TAG" ]]; then
            if gh release download "$UNSTABLE_TAG" --pattern 'repo-unstable.tar.gz' --dir /tmp/repo 2>/dev/null; then
              echo "==> Extracting unstable package repo ($UNSTABLE_TAG)"
              mkdir -p site/packages/unstable
              tar -xzf /tmp/repo/repo-unstable.tar.gz -C site/packages/unstable/
            fi
          fi

          if [[ ! -d site/packages/stable && ! -d site/packages/unstable ]]; then
            echo "==> No package repos found, deploying docs only"
          fi

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd site
          touch .nojekyll
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy docs"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" gh-pages
