name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write  # needed to create the GitHub Release and upload repo tarball
  actions: write   # needed to trigger the Docs workflow

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Full CI gate — same checks as ci.yml; the release must be green before
  # any packages are built.
  # ---------------------------------------------------------------------------
  ci:
    name: CI gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: uv sync --group dev
      - run: uv run ruff check quadletman/
      - run: uv run ruff format --check quadletman/
      - run: uv run pytest
      - run: npm ci
      - run: npm test

  # ---------------------------------------------------------------------------
  # Python wheel (platform-independent)
  # ---------------------------------------------------------------------------
  build-wheel:
    name: Build wheel
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # hatch-vcs needs the full tag history
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --group dev
      - run: uv build --wheel
      - uses: actions/upload-artifact@v7
        with:
          name: wheel
          path: dist/*.whl

  # ---------------------------------------------------------------------------
  # RPM package (noarch — venv with C extensions is built on the target)
  # ---------------------------------------------------------------------------
  build-rpm:
    name: Build RPM
    needs: ci
    runs-on: ubuntu-latest
    container: fedora:42
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build tools
        run: |
          dnf install -y \
            rpm-build rpmdevtools python3 python3-pip python3-virtualenv \
            systemd-rpm-macros git rsync

      - name: Set up rpmbuild tree
        run: rpmdev-setuptree

      - name: Build RPM
        env:
          VERSION: ${{ github.ref_name }}  # e.g. "v0.3.1"
        run: |
          # Strip the leading 'v' that git tags carry
          export VERSION="${VERSION#v}"
          bash packaging/build-rpm.sh
          # Collect output RPM into a known location
          mkdir -p /tmp/rpm-out
          cp ~/rpmbuild/RPMS/*/quadletman-*.rpm /tmp/rpm-out/

      - uses: actions/upload-artifact@v7
        with:
          name: rpm-noarch
          path: /tmp/rpm-out/*.rpm

  # ---------------------------------------------------------------------------
  # DEB package (arch: all — venv with C extensions is built on the target)
  # ---------------------------------------------------------------------------
  build-deb:
    name: Build DEB
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            debhelper dh-python python3 python3-venv python3-pip \
            devscripts build-essential rsync git

      - name: Build DEB
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          export VERSION="${VERSION#v}"
          bash packaging/build-deb.sh
          mkdir -p /tmp/deb-out
          cp quadletman_*.deb /tmp/deb-out/

      - uses: actions/upload-artifact@v7
        with:
          name: deb-all
          path: /tmp/deb-out/*.deb

  # ---------------------------------------------------------------------------
  # Publish: create GitHub Release and attach all built packages
  # ---------------------------------------------------------------------------
  publish:
    name: Publish release
    needs: [build-wheel, build-rpm, build-deb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Extract changelog section
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[$TAG\]/{found=1; next} found && /^## \[/{exit} found && !/^\[/{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          echo "$NOTES" > release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.txt
          files: release-assets/*
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ---------------------------------------------------------------------------
  # Publish package repository to GitHub Pages
  # ---------------------------------------------------------------------------
  publish-repo:
    name: Publish package repo
    needs: [build-rpm, build-deb, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download RPM artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: rpm-*
          path: artifacts/
          merge-multiple: true

      - name: Download DEB artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: deb-*
          path: artifacts/
          merge-multiple: true

      - name: Install repo tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y createrepo-c dpkg-dev rpm

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: bash scripts/repo-gpg-key.sh ci-import

      - name: Determine channel
        id: channel
        run: |
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            echo "name=unstable" >> "$GITHUB_OUTPUT"
          else
            echo "name=stable" >> "$GITHUB_OUTPUT"
          fi

      - name: Build repository
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          REPO_URL_BASE: https://mikkovihonen.github.io/quadletman/packages/${{ steps.channel.outputs.name }}
        run: bash scripts/publish-repo.sh artifacts/

      - name: Upload repo tarball as release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tar -czf "repo-${{ steps.channel.outputs.name }}.tar.gz" -C _site .
          gh release upload "$GITHUB_REF_NAME" "repo-${{ steps.channel.outputs.name }}.tar.gz" --clobber

      - name: Trigger docs deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run docs.yml
