fail_fast: true

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        files: ^quadletman/|^tests/

      - id: vitest
        name: vitest
        entry: npm test
        language: system
        pass_filenames: false
        files: ^quadletman/static/src/.*\.js$|^tests/js/.*\.js$

      - id: tailwindcss
        name: tailwindcss
        entry: env TAILWINDCSS_VERSION=v4.2.2 uv run tailwindcss -i quadletman/static/src/app.css -o quadletman/static/src/tailwind.css --minify
        language: system
        pass_filenames: false
        files: ^quadletman/static/src/app\.css$|^quadletman/templates/.*\.html$
