repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true

      - id: vitest
        name: vitest
        entry: npm test
        language: system
        pass_filenames: false
        files: ^quadletman/static/src/.*\.js$|^tests/js/.*\.js$
