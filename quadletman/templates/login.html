<!DOCTYPE html>
<html lang="en" class="qm-html">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>quadletman — {{ _("login") }}</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2360a5fa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M5 12h14M12 5l7 7-7 7'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/static/src/tailwind.css">
</head>
<body class="qm-login-body">
  <div class="w-full max-w-sm">
    <div class="flex items-center justify-center gap-3 mb-8">
      <svg class="qm-navbar-icon w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
      <span class="qm-login-brand">quadletman</span>
    </div>

    <div class="qm-login-card">
      <h1 class="qm-login-title">{{ _("Sign in") }}</h1>

      {% if error %}
      <div class="qm-login-error">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-4">
        <input type="hidden" name="next" value="{{ next | default('/') }}">
        <div>
          <label class="qm-label" for="username">{{ _("Username") }}</label>
          <input id="username" type="text" name="username" required autofocus
                 autocomplete="username"
                 class="qm-login-input">
        </div>
        <div>
          <label class="qm-label" for="password">{{ _("Password") }}</label>
          <input id="password" type="password" name="password" required
                 autocomplete="current-password"
                 class="qm-login-input">
        </div>
        <button type="submit"
                class="qm-login-submit">
          {{ _("Sign in") }}
        </button>
      </form>
    </div>
  </div>
</body>
</html>
