{% for compartment in compartments %}
<div class="w-full border-b border-gray-700 last:border-0">
  <button onclick="loadCompartment('{{ compartment.id }}')"
          class="w-full text-left px-4 py-3 hover:bg-gray-800 transition group">
    <div class="flex items-center justify-between gap-2">
      <span class="text-sm font-medium text-gray-200 group-hover:text-white truncate">
        {{ compartment.id }}
      </span>
      <div class="flex items-center gap-1.5 shrink-0">
        <span class="text-xs text-gray-500 comp-count">{{ compartment.containers | length }}c</span>
        <span id="cmp-dot-{{ compartment.id }}"
              class="w-2 h-2 rounded-full bg-gray-700 inline-block shrink-0"></span>
      </div>
    </div>
  </button>
</div>
{% else %}
<div class="p-4 text-sm text-gray-500 text-center mt-4">{{ _("No compartments yet.") }}</div>
{% endfor %}
{% if compartments %}
<span hx-get="/api/status-dots" hx-trigger="load, every 10s" hx-swap="none"></span>
{% endif %}
