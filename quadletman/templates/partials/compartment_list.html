{% for compartment in compartments %}
<div class="qm-fb-row w-full">
  <button onclick="loadCompartment('{{ compartment.id }}')"
          class="qm-comp-btn group">
    <div class="qm-row-between gap-2">
      <span class="qm-comp-name group-hover:text-white">
        {{ compartment.id }}
      </span>
      <div class="qm-row-center gap-1.5 shrink-0">
        <span class="qm-hint comp-count">{{ compartment.containers | length }}c</span>
        <span id="cmp-dot-{{ compartment.id }}"
              class="qm-dot qm-dot-loading inline-block"></span>
      </div>
    </div>
  </button>
</div>
{% else %}
<div class="p-4 qm-loading qm-text-center mt-4">{{ _("No compartments yet.") }}</div>
{% endfor %}
{% if compartments %}
{% endif %}
