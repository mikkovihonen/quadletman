<!-- Live metrics for a single compartment — JS-polled, no HTMX swap -->
<div class="qm-card p-4">
  <div class="qm-metrics-grid-4">
    <!-- CPU -->
    <div>
      <div class="flex justify-between qm-metric-label">
        <span>{{ _("CPU") }}</span><span id="comp-cpu-val">—</span>
      </div>
      <canvas id="comp-cpu-canvas" width="200" height="36" class="qm-sparkline"></canvas>
    </div>
    <!-- RAM -->
    <div>
      <div class="flex justify-between qm-metric-label">
        <span>{{ _("RAM") }}</span><span id="comp-mem-val">—</span>
      </div>
      <canvas id="comp-mem-canvas" width="200" height="36" class="qm-sparkline"></canvas>
    </div>
    <!-- Processes -->
    <div class="flex flex-col justify-center">
      <div class="qm-metric-label">{{ _("Processes") }}</div>
      <button id="comp-proc-val"
              onclick="showProcModal({{ (compartment_id if compartment_id is defined else compartment.id) | tojson | forceescape }}, {{ (compartment.id if compartment is defined else compartment_id) | tojson | forceescape }})"
              class="qm-stat-value qm-stat-link">—</button>
    </div>
    <!-- Disk -->
    <div class="flex flex-col justify-center">
      <div class="qm-metric-label">{{ _("Disk") }}</div>
      <button id="comp-disk-val"
              onclick="showDiskModal({{ (compartment_id if compartment_id is defined else compartment.id) | tojson | forceescape }}, {{ (compartment.id if compartment is defined else compartment_id) | tojson | forceescape }})"
              class="qm-stat-value qm-stat-link">—</button>
    </div>
  </div>
</div>

<script>
(function () {
  const comp_ID = {{ (compartment_id if compartment_id is defined else compartment.id) | tojson }};
  const HISTORY = 60;
  const hist = { cpu: [], mem: [] };

  function push(cpu, mem) {
    hist.cpu.push(cpu);
    hist.mem.push(mem);
    if (hist.cpu.length > HISTORY) { hist.cpu.shift(); hist.mem.shift(); }
  }

  const poller = ViewPoller({
    url: '/api/compartments/' + comp_ID + '/poll',
    onData: function (data) {
      push(data.cpu_percent, data.mem_bytes);
      setText('comp-cpu-val', data.cpu_percent.toFixed(1) + '%');
      setText('comp-mem-val', fmtBytes(data.mem_bytes));
      setText('comp-proc-val', data.proc_count);
      drawSparkline(document.getElementById('comp-cpu-canvas'), hist.cpu, '#4ade80');
      drawSparkline(document.getElementById('comp-mem-canvas'), hist.mem, '#60a5fa');
      renderStatusBadges(comp_ID, data.statuses);
      if (data.status_dot) {
        renderStatusDots([data.status_dot]);
      }
    },
    onDisk: function (d) {
      const total = d.images.reduce(function (s, x) { return s + x.bytes; }, 0) +
                    d.overlays.reduce(function (s, x) { return s + x.bytes; }, 0) +
                    d.volumes_total +
                    (d.config_bytes || 0);
      setText('comp-disk-val', fmtBytes(total));
    }
  });
  poller.start();
}());
</script>
