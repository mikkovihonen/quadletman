{% if not services %}
<div class="flex items-center justify-center h-full text-gray-600">
  <div class="text-center">
    <p class="text-lg">No services yet</p>
    <p class="text-sm mt-2">Create a new one with <span class="text-gray-400">+ New</span> in the sidebar</p>
  </div>
</div>
{% else %}
<div class="min-h-full flex flex-col">
<div class="w-full max-w-5xl mx-auto pt-4">
  <h2 class="text-lg font-semibold text-white mb-3">Services Overview</h2>
</div>
<div class="flex-1 flex items-center">
<div class="w-full max-w-5xl mx-auto space-y-4">
  <div class="bg-gray-800 rounded-xl border border-gray-700 px-5 py-3 grid grid-cols-4 gap-4">
      <div>
        <div class="text-xs text-gray-400 mb-0.5">Total CPU</div>
        <div id="total-cpu" class="text-lg font-mono font-semibold text-white">—</div>
      </div>
      <div>
        <div class="text-xs text-gray-400 mb-0.5">Total RAM</div>
        <div id="total-mem" class="text-lg font-mono font-semibold text-white">—</div>
      </div>
      <div>
        <div class="text-xs text-gray-400 mb-0.5">Total Disk</div>
        <div id="total-disk" class="text-lg font-mono font-semibold text-white">—</div>
      </div>
      <div>
        <div class="text-xs text-gray-400 mb-0.5">Total Processes</div>
        <div id="total-procs" class="text-lg font-mono font-semibold text-white">—</div>
      </div>
    </div>
  <div id="metrics-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
    {% for svc in services %}
    <div id="metric-card-placeholder-{{ svc.id }}"
         class="bg-gray-800 rounded-xl border border-gray-700 p-4 cursor-pointer hover:border-gray-500 transition"
         onclick="loadService('{{ svc.id }}')">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-medium text-white">{{ svc.id }}</h3>
        <span class="text-xs text-gray-500 font-mono" id="proc-{{ svc.id }}">—</span>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <div class="flex justify-between text-xs text-gray-400 mb-1">
            <span>CPU</span><span id="cpu-val-{{ svc.id }}">—</span>
          </div>
          <canvas id="cpu-canvas-{{ svc.id }}" width="200" height="36" class="w-full" style="height:36px"></canvas>
        </div>
        <div>
          <div class="flex justify-between text-xs text-gray-400 mb-1">
            <span>RAM</span><span id="mem-val-{{ svc.id }}">—</span>
          </div>
          <canvas id="mem-canvas-{{ svc.id }}" width="200" height="36" class="w-full" style="height:36px"></canvas>
        </div>
      </div>
      <div class="mt-3 flex items-center justify-between text-xs text-gray-500 border-t border-gray-700 pt-2">
        <span>Disk</span><span id="disk-val-{{ svc.id }}">—</span>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
</div>
</div>

<script>
(function () {
  const HISTORY = 60;
  const hist = {};

  function ensure(id) {
    if (!hist[id]) hist[id] = { cpu: [], mem: [] };
  }

  function push(id, cpu, mem) {
    ensure(id);
    hist[id].cpu.push(cpu);
    hist[id].mem.push(mem);
    if (hist[id].cpu.length > HISTORY) { hist[id].cpu.shift(); hist[id].mem.shift(); }
  }

  function fmtBytes(b) {
    if (b >= 1e9) return (b / 1e9).toFixed(1) + ' GB';
    if (b >= 1e6) return (b / 1e6).toFixed(1) + ' MB';
    if (b >= 1e3) return (b / 1e3).toFixed(1) + ' KB';
    return b + ' B';
  }

  function drawSparkline(canvas, data, color) {
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    if (data.length < 2) return;
    const max = Math.max(...data, 0.001);

    // Fill area under line
    ctx.beginPath();
    data.forEach((v, i) => {
      const x = (i / (data.length - 1)) * W;
      const y = H - (v / max) * H * 0.85 - 2;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fillStyle = color + '22';
    ctx.fill();

    // Line
    ctx.beginPath();
    data.forEach((v, i) => {
      const x = (i / (data.length - 1)) * W;
      const y = H - (v / max) * H * 0.85 - 2;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  function setText(id, text) {
    const el = document.getElementById(id);
    if (el) el.textContent = text;
  }

  async function poll() {
    try {
      const r = await fetch('/api/metrics');
      if (!r.ok) return;
      const data = await r.json();
      let totalCpu = 0, totalMem = 0, totalProcs = 0;
      data.forEach(m => {
        push(m.service_id, m.cpu_percent, m.mem_bytes);
        setText('cpu-val-' + m.service_id, m.cpu_percent.toFixed(1) + '%');
        setText('mem-val-' + m.service_id, fmtBytes(m.mem_bytes));
        setText('proc-' + m.service_id, m.proc_count + (m.proc_count === 1 ? ' proc' : ' procs'));
        drawSparkline(document.getElementById('cpu-canvas-' + m.service_id), hist[m.service_id].cpu, '#4ade80');
        drawSparkline(document.getElementById('mem-canvas-' + m.service_id), hist[m.service_id].mem, '#60a5fa');
        totalCpu += m.cpu_percent;
        totalMem += m.mem_bytes;
        totalProcs += m.proc_count;
      });
      setText('total-cpu', totalCpu.toFixed(1) + '%');
      setText('total-mem', fmtBytes(totalMem));
      setText('total-procs', totalProcs);
    } catch (_) {}
  }

  async function pollDisk() {
    try {
      const r = await fetch('/api/metrics/disk');
      if (!r.ok) return;
      const data = await r.json();
      let totalDisk = 0;
      data.forEach(m => {
        setText('disk-val-' + m.service_id, fmtBytes(m.disk_bytes));
        totalDisk += m.disk_bytes;
      });
      setText('total-disk', fmtBytes(totalDisk));
    } catch (_) {}
  }

  poll();
  pollDisk();
  const timer = setInterval(poll, 3000);
  const diskTimer = setInterval(pollDisk, 30000);

  // Stop polling when HTMX swaps this content away
  document.getElementById('metrics-grid').addEventListener('htmx:beforeSwap', () => { clearInterval(timer); clearInterval(diskTimer); }, { once: true });
  document.addEventListener('htmx:beforeSwap', function cleanup(e) {
    if (e.target && e.target.id === 'main-content') {
      clearInterval(timer);
      clearInterval(diskTimer);
      document.removeEventListener('htmx:beforeSwap', cleanup);
    }
  });
}());
</script>
{% endif %}
