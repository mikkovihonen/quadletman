{% if events %}
<div class="qm-tbody">
  {% for event in events %}
  <div class="qm-event-row">
    <span class="qm-event-time">
      {{ event.created_at[:19] }}
    </span>
    <span class="qm-event-type
      {% if event.event_type in ['start', 'create', 'volume_create', 'container_add'] %}qm-text-success
      {% elif event.event_type in ['stop', 'delete'] %}qm-text-warn
      {% elif event.event_type == 'error' %}qm-text-danger
      {% else %}qm-text-muted{% endif %}">
      {{ event.event_type }}
    </span>
    <span class="qm-event-msg">{{ event.message }}</span>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="qm-loading-center">{{ _("No events recorded yet.") }}</div>
{% endif %}
