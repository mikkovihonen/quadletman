{% if lines %}
<pre class="log-output qm-events-pre">{{ lines | join('\n') }}</pre>
{% else %}
<div class="flex-1 flex items-center justify-center px-8">
  <p class="qm-loading qm-text-center">
    {% for phrase in empty_msg.split(' — ') %}
    {{ phrase }}{% if not loop.last %}<br>{% endif %}
    {% endfor %}
  </p>
</div>
{% endif %}
