{% if matches %}
<div class="qm-stack-1">
  {% for m in matches %}
  <div class="qm-mono-sm qm-text-muted qm-truncate-text" title="{{ m.cmdline }}">
    {{ m.cmdline }}
    <span class="qm-text-dimmer ml-1">{{ _("seen") }} {{ m.times_seen }}×</span>
  </div>
  {% endfor %}
</div>
{% else %}
<p class="qm-hint qm-italic">{{ _("No matching processes") }}</p>
{% endif %}
