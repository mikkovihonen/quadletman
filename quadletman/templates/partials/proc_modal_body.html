{% if not procs %}
<tr>
  <td colspan="5" class="px-5 py-4 text-gray-500">{{ _("No processes running.") }}</td>
</tr>
{% else %}
{% for p in procs %}
<tr class="hover:bg-gray-800/50">
  <td class="px-5 py-1.5 text-gray-400">{{ p.pid }}</td>
  <td class="px-3 py-1.5 text-green-400">{{ p.name }}</td>
  <td class="px-3 py-1.5 text-gray-400 max-w-xs truncate hidden md:table-cell" title="{{ p.cmdline }}">{{ p.cmdline }}</td>
  <td class="px-3 py-1.5 text-right text-yellow-400">{{ "%.1f"|format(p.cpu_percent) }}%</td>
  <td class="px-5 py-1.5 text-right text-blue-400">{{ p.mem_bytes|fmt_bytes }}</td>
</tr>
{% endfor %}
{% endif %}
