{% if not procs %}
<tr>
  <td colspan="5" class="qm-proc-empty">{{ _("No processes running.") }}</td>
</tr>
{% else %}
{% for p in procs %}
<tr class="qm-proc-row">
  <td class="qm-proc-td-first qm-text-muted">{{ p.pid }}</td>
  <td class="qm-proc-td qm-text-success">{{ p.name }}</td>
  <td class="qm-proc-td qm-text-muted max-w-xs qm-truncate-text hidden md:table-cell" title="{{ p.cmdline }}">{{ p.cmdline }}</td>
  <td class="qm-proc-td qm-text-right qm-text-warn">{{ "%.1f"|format(p.cpu_percent) }}%</td>
  <td class="qm-proc-td-first qm-text-right qm-text-info">{{ p.mem_bytes|fmt_bytes }}</td>
</tr>
{% endfor %}
{% endif %}
