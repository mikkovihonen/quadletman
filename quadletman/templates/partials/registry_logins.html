{% from "macros/ui.html" import fade_attrs %}
<div id="registry-logins" class="qm-card" x-data="{ showForm: false }">
  <div class="qm-card-header">
    <div>
      <h3 class="font-medium">Registry Logins</h3>
      <p class="qm-section-desc">Credentials stored per compartment root for pulling images from private registries.</p>
    </div>
    <button type="button" @click="showForm = !showForm" class="qm-btn-section">
      <span class="w-3.5 shrink-0" x-text="showForm ? '–' : '+'"></span>
      <span class="flex-1 text-center" x-text="showForm ? 'Cancel' : 'Add login'"></span>
    </button>
  </div>

  {% if error %}
  <div class="qm-card-body">
    <p class="text-xs text-red-400">{{ error }}</p>
  </div>
  {% endif %}

  {% if logins %}
  <div class="divide-y divide-gray-700">
    {% for reg in logins %}
    <div class="qm-card-row">
      <span class="qm-card-row-label font-mono text-green-400">{{ reg }}</span>
      <form hx-post="/api/compartments/{{ compartment_id }}/registry-logout"
            hx-target="#registry-logins"
            hx-swap="outerHTML"
            hx-confirm="Log out from {{ reg }}? Running containers may fail to pull images.">
        <input type="hidden" name="registry" value="{{ reg }}">
        <button type="submit" class="qm-btn-row-danger">Logout</button>
      </form>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <div class="qm-card-empty">No registry logins.</div>
  {% endif %}

  <!-- Add login form -->
  <div x-show="showForm" x-cloak
       {{ fade_attrs() }}
    <form hx-post="/api/compartments/{{ compartment_id }}/registry-login"
          hx-target="#registry-logins"
          hx-swap="outerHTML"
          class="qm-card-body space-y-3 border-t border-gray-700">
      <div>
        <label class="qm-form-label">Registry</label>
        <input type="text" name="registry" value="docker.io"
               placeholder="docker.io"
               class="qm-input-sm w-full">
      </div>
      <div>
        <label class="qm-form-label">Username</label>
        <input type="text" name="username" placeholder="Username"
               class="qm-input-sm w-full">
      </div>
      <div>
        <label class="qm-form-label">Password / token</label>
        <input type="password" name="password" placeholder="••••••••"
               autocomplete="new-password"
               class="qm-input-sm w-full">
      </div>
      <div class="qm-form-footer">
        <button type="button" @click="showForm = false" class="qm-btn-cancel">Cancel</button>
        <button type="submit" class="qm-btn-confirm">Login</button>
      </div>
    </form>
  </div>
</div>
