<div id="registry-logins" class="bg-gray-800 rounded-xl border border-gray-700" x-data="{ showForm: false }">
  <div class="flex items-center justify-between px-5 py-3 border-b border-gray-700">
    <div>
      <h3 class="font-medium">Registry Logins</h3>
      <p class="text-xs text-gray-500 mt-0.5">Credentials stored per service user for pulling images from private registries.</p>
    </div>
    <button type="button" @click="showForm = !showForm"
            class="text-xs bg-blue-600 hover:bg-blue-500 text-white px-2 py-1 rounded transition"
            x-text="showForm ? '– Cancel' : '+ Add login'">
    </button>
  </div>
  <div class="px-5 py-4 space-y-3">
    {% if error %}
    <p class="text-xs text-red-400">{{ error }}</p>
    {% endif %}

    {% if logins %}
    <div class="space-y-1">
      {% for reg in logins %}
      <div class="flex items-center justify-between bg-gray-900/50 rounded px-3 py-1.5">
        <span class="font-mono text-green-400 text-xs">{{ reg }}</span>
        <form hx-post="/api/services/{{ service_id }}/registry-logout"
              hx-target="#registry-logins"
              hx-swap="outerHTML"
              hx-confirm="Log out from {{ reg }}? Running containers may fail to pull images.">
          <input type="hidden" name="registry" value="{{ reg }}">
          <button type="submit"
                  class="text-xs text-red-400 hover:text-red-300 transition">
            Logout
          </button>
        </form>
      </div>
      {% endfor %}
    </div>
    {% else %}
    <p class="text-xs text-gray-500">
      No registry logins.
      <button type="button" @click="showForm = true"
              class="text-blue-400 hover:underline ml-1">Add one</button>
    </p>
    {% endif %}

    <!-- Add login form -->
    <div x-show="showForm" x-cloak
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0">
      <form hx-post="/api/services/{{ service_id }}/registry-login"
            hx-target="#registry-logins"
            hx-swap="outerHTML"
            class="space-y-3 pt-3 border-t border-gray-700">
        <div>
          <label class="block text-xs text-gray-400 mb-1">Registry</label>
          <input type="text" name="registry" value="docker.io"
                 placeholder="docker.io"
                 class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1 text-xs text-white focus:outline-none focus:border-blue-500">
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">Username</label>
          <input type="text" name="username" placeholder="Username"
                 class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1 text-xs text-white focus:outline-none focus:border-blue-500">
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">Password / token</label>
          <input type="password" name="password" placeholder="••••••••"
                 autocomplete="new-password"
                 class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1 text-xs text-white focus:outline-none focus:border-blue-500">
        </div>
        <button type="submit"
                class="text-xs bg-blue-600 hover:bg-blue-500 text-white px-2 py-1 rounded transition">
          Login
        </button>
      </form>
    </div>
  </div>
</div>
