{% from "macros/ui.html" import fade_attrs %}
<div id="registry-logins" class="qm-card" x-data="{ showForm: false }">
  <div class="qm-card-header">
    <div>
      <h3 class="font-medium">{{ _("Registry Logins") }}</h3>
      <p class="qm-section-desc">{{ _("Credentials stored per compartment root for pulling images from private registries.") }}</p>
    </div>
    <button type="button" @click="showForm = !showForm" class="qm-btn-section">
      <span class="w-3.5 shrink-0" x-text="showForm ? '–' : '+'"></span>
      <span class="flex-1 text-center" x-text="showForm ? '{{ _('Cancel') }}' : '{{ _('Add login') }}'"></span>
    </button>
  </div>

  {% if error %}
  <div class="qm-card-body">
    <p class="text-xs text-red-400">{{ error }}</p>
  </div>
  {% endif %}

  {% if logins %}
  <div class="qm-card-list">
    {% for reg in logins %}
    <div class="qm-card-row">
      <span class="qm-card-row-label font-mono text-green-400">{{ reg }}</span>
      <form hx-post="/api/compartments/{{ compartment_id }}/registry-logout"
            hx-target="#registry-logins"
            hx-swap="outerHTML"
            hx-confirm="{{ _("Log out from %(reg)s? Running containers may fail to pull images.") % {"reg": reg} }}">
        <input type="hidden" name="registry" value="{{ reg }}">
        <button type="submit" class="qm-btn-row-danger">{{ _("Logout") }}</button>
      </form>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <!-- Add login form -->
  <div x-show="showForm" x-cloak
       {{ fade_attrs() }}
    <form hx-post="/api/compartments/{{ compartment_id }}/registry-login"
          hx-target="#registry-logins"
          hx-swap="outerHTML"
          class="qm-card-body space-y-3">
      <div>
        <label class="qm-form-label">{{ _("Registry") }}</label>
        <input type="text" name="registry" value="docker.io"
               placeholder="docker.io"
               class="qm-input-sm w-full">
      </div>
      <div>
        <label class="qm-form-label">{{ _("Username") }}</label>
        <input type="text" name="username" placeholder="{{ _("Username") }}"
               class="qm-input-sm w-full">
      </div>
      <div>
        <label class="qm-form-label">{{ _("Password / token") }}</label>
        <input type="password" name="password" placeholder="••••••••"
               autocomplete="new-password"
               class="qm-input-sm w-full">
      </div>
      <div class="qm-form-footer">
        <button type="button" @click="showForm = false" class="qm-btn-cancel-sm">{{ _("Cancel") }}</button>
        <button type="submit" class="qm-btn-confirm-sm">{{ _("Login") }}</button>
      </div>
    </form>
  </div>
</div>
