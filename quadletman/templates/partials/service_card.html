{% set statuses = statuses or [] %}
{% set status_map = {} %}
{% for s in statuses %}
  {% set _ = status_map.update({s.container: s}) %}
{% endfor %}

<div id="service-{{ service.id }}" class="space-y-4">
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-xl font-semibold text-white">{{ service.id }}</h2>
      <div class="text-sm text-gray-400 mt-0.5">
        User: <code class="text-green-400">{{ service.linux_user }}</code>
      </div>
      {% if service.description %}
      <p class="text-sm text-gray-400 mt-1">{{ service.description }}</p>
      {% endif %}
    </div>
    <div class="flex gap-2">
      <button hx-post="/api/services/{{ service.id }}/start"
              hx-target="#main-content"
              hx-swap="innerHTML"
              hx-indicator="#global-spinner"
              class="px-3 py-1.5 text-sm bg-green-700 hover:bg-green-600 rounded transition">
        ▶ Start
      </button>
      <button hx-post="/api/services/{{ service.id }}/stop"
              hx-target="#main-content"
              hx-swap="innerHTML"
              hx-indicator="#global-spinner"
              class="px-3 py-1.5 text-sm bg-yellow-700 hover:bg-yellow-600 rounded transition">
        ⏹ Stop
      </button>
      <button hx-post="/api/services/{{ service.id }}/restart"
              hx-target="#main-content"
              hx-swap="innerHTML"
              hx-indicator="#global-spinner"
              class="px-3 py-1.5 text-sm bg-blue-700 hover:bg-blue-600 rounded transition">
        ↺ Restart
      </button>
      <button hx-delete="/api/services/{{ service.id }}"
              hx-target="#service-list"
              hx-swap="innerHTML"
              hx-confirm="Delete service '{{ service.id }}' and all its containers and volumes? This cannot be undone."
              hx-indicator="#global-spinner"
              class="px-3 py-1.5 text-sm bg-red-800 hover:bg-red-700 rounded transition">
        🗑 Delete
      </button>
    </div>
  </div>
</div>
