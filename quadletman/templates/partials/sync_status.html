{% if issues %}
<div id="sync-status-{{ compartment_id }}" class="mt-3 space-y-2" x-data>
  <div class="flex items-center gap-2">
    <span class="text-xs text-yellow-400 font-medium">⚠ {{ issues | length }} file(s) out of sync</span>
    <button hx-post="/api/compartments/{{ compartment_id }}/sync"
            hx-target="#sync-status-{{ compartment_id }}"
            hx-swap="outerHTML"
            hx-indicator="#global-spinner"
            class="text-xs bg-blue-600 hover:bg-blue-500 text-white px-2 py-0.5 rounded transition">
      Re-sync
    </button>
  </div>
  {% for issue in issues %}
  <div x-data="{ open: false }" class="border border-yellow-800/50 rounded">
    <button @click="open = !open"
            class="w-full flex items-center justify-between px-3 py-1.5 text-xs text-left hover:bg-gray-700/50 transition">
      <span>
        <span class="font-mono text-yellow-300">{{ issue.file }}</span>
        <span class="ml-2 text-gray-500">{{ issue.status }}</span>
      </span>
      <span class="text-gray-500" x-text="open ? '▲' : '▼'"></span>
    </button>
    <div x-show="open" x-cloak class="border-t border-yellow-800/30">
      <pre class="text-xs font-mono overflow-x-auto p-3 leading-5 bg-gray-900">{% for line in issue.diff.splitlines() %}<span class="{% if line.startswith('+') and not line.startswith('+++') %}text-green-400{% elif line.startswith('-') and not line.startswith('---') %}text-red-400{% elif line.startswith('@@') %}text-blue-400{% else %}text-gray-400{% endif %}">{{ line | e }}
</span>{% endfor %}</pre>
    </div>
  </div>
  {% endfor %}
</div>
{% else %}
<span class="inline-flex items-center gap-1 text-xs text-green-500">
  ✓ In sync
</span>
{% endif %}
