<div class="qm-pad-4">
  <!-- Header -->
  <div class="qm-row-center gap-3 mb-4">
    <button hx-get="/api/compartments/{{ compartment_id }}/volumes/{{ volume.id }}/browse?path={{ dir_path | urlencode }}"
            hx-target="#volume-browser-content"
            class="qm-btn-row">
      ← {{ _("Back") }}
    </button>
    <div class="qm-truncate">
      <span class="qm-hint qm-mono">{{ volume.qm_name }}</span>
      <span class="qm-path-sep">/</span>
      <span class="qm-mono qm-text-em">{{ path }}</span>
      {% if is_new %}
      <span class="qm-hint qm-text-warn ml-2">{{ _("new file") }}</span>
      {% endif %}
    </div>
  </div>

  <!-- Editor form -->
  <form hx-put="/api/compartments/{{ compartment_id }}/volumes/{{ volume.id }}/file?path={{ path | urlencode }}"
        hx-target="#volume-browser-content"
        hx-encoding="application/x-www-form-urlencoded"
        class="qm-stack-3">
    <textarea name="content"
              rows="24"
              spellcheck="false"
              class="qm-editor">{{ content | e }}</textarea>
    <div class="qm-form-footer">
      <button type="button"
              hx-get="/api/compartments/{{ compartment_id }}/volumes/{{ volume.id }}/browse?path={{ dir_path | urlencode }}"
              hx-target="#volume-browser-content"
              class="qm-btn-cancel">{{ _("Cancel") }}</button>
      <button type="submit"
              class="qm-btn-confirm">
        {% if is_new %}{{ _("Create") }}{% else %}{{ _("Save") }}{% endif %}
      </button>
    </div>
  </form>
</div>
